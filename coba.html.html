<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lesehan family</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
        <link rel="stylesheet" href="css/stylecoba.css">
    </head>
    <body>
        <div class="contact-section">
            <div class="contact-info">
                <div><i class="fas fa-map-marker-alt"></i>Address, City, Country</div>
                <div><i class="far fa-envelope"></i>mochfarrel008@gmail.com</div>
                <div><i class="fas fa-phone"></i>082331492038</div>
                <div><i class="far fa-clock"></i>Mon - Fri 8:00 AM to 5:00 PM</div>
            </div>
            <div class="contact-form">
                <h2>Contact Us</h2>
                <form action="" class="contact" method="post">
                    <input type="text" name="name" class="text-box" placeholder="Your Name" required>
                    <input type="email" name="email" class="text-box" placeholder="Your Email" required>
                    <textarea name="message" id=""
                    rows="5" placeholder="Your Message" required></textarea>
                    <input type="submit" value="Send" name="submit" class="send-btn">
                </form>
            </div>
        </div>
    </body>
</html>
